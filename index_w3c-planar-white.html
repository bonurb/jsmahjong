    const types = ["circle", "bamboo", "character", "wind", "dragon", "season", "flower"];
    let tileIds = new Array(144);
    for (let i = 0; i < 144; i++) {
      tileIds[i] = i;
    }

    function pseudoRandom(seed) {
      let value = seed;

      return function () {
        value = value * 16807 % 2147483647;
        return (value - 1) / 2147483647;
      }
    }

    let generator = pseudoRandom(1);

    function getGame(gameNo) {
      for (let i = 0; i < 144; i++) {
        tileIds[i] = i;
      }
      let gen = pseudoRandom(gameNo);
      for (let i = tileIds.length - 1; i > 0; i--) {
        let j = Math.floor(gen() * (i + 1));
        let k = tileIds[i];
        tileIds[i] = tileIds[j];
        tileIds[j] = k;
      }
    }

    function play(img) {
      var audio = document.getElementById("audio");
      audio.play();
      alert(img.id);
    }

    //--------------------------

    //--------------------------
    // der Tile Raum: 29 x 15 x 7
    const MAX_X = 29;
    const MAX_Y = 15;
    const MAXLEV = 7;
    const OFFSET = 40;
    const DX = 6;
    const DY = 6;
    let mjCube = new Array(MAX_X);

    for (let i = 0; i < MAX_X; i++) {
      mjCube[i] = new Array(MAX_Y);
      for (let j = 0; j < MAX_Y; j++) {
        mjCube[i][j] = new Array(MAXLEV);
      }
    }

    function resetMjCube() {
      for (let x = 0; x < MAX_X; x++) {
        for (let y = 0; y < MAX_Y; y++) {
          for (let z = 0; z < MAXLEV; z++) {
            mjCube[x][y][z] = "-1";
          }
        }
      }
    }

    function resetZIndex() {
      for (let i = 0; i < 144; i++) {
        tiles[i].img.style.zIndex = -1;
      }
    }

    function dropTile(x, y, tileId) {
      let z = 0;
      let xp = x + 1;
      let yp = y + 1;
      if (xp == MAX_X) {
        xp = x;
      }
      if (yp == MAX_Y) {
        yp = y;
      }

      for (let i = 0; i < MAXLEV; i++) {
        if ((mjCube[x][y][z] == -1) && (mjCube[xp][y][z] == -1)
          && (mjCube[x][yp][z] == -1) && (mjCube[xp][yp][z] == -1)) {
          break;
        }
        z++;
        if (z == MAXLEV) {
          return -1;
        }
      }
      mjCube[x][y][z] = tileId;
      mjCube[xp][y][z] = tileId;
      mjCube[x][yp][z] = tileId;
      mjCube[xp][yp][z] = tileId;

      return z;
    }

    function fillMjCube(layout) {
      for (let lo = 0; lo < layout.length; lo++) {
        let lox = layout[lo][0];
        let loy = layout[lo][1];
        let tid = tileIds[lo];
        let tile = tiles[tid];

        let z = dropTile(lox, loy, tid);
        tile.x = lox;
        tile.y = loy;
        tile.z = z;
        tile.img.style.visibility = "visible";
        tile.img.style.left = (lox * 22) + OFFSET + (z * DX) + "px";
        tile.img.style.top = (loy * 32) + OFFSET - (z * DY) + "px";
        // tile.img.setAttribute("data-ix", "my data: " + lox);
      }
    }

    function adjustZIndex() {
      let zi = 5; z = 0; y = 0;
      for (let z = 0; z < MAXLEV; z++) {
        for (let x = MAX_X - 1; x >= 0; x--) {
          for (let y = 0; y < MAX_Y; y++) {
            if (mjCube[x][y][z] != -1) {
              let tile = tiles[mjCube[x][y][z]];
              if (tile.img.style.zIndex == -1) {
                tile.img.style.zIndex = zi++;
              }
            }
          }
        }
      }
    }
    // der Tile Raum
    //--------------------------

    //--------------------------
    // Tile
    class Tile {
      constructor(img, type) {  // Class constructor
        this.img = img;
        this.type = type;
        this.x = -1;
        this.y = -1;
        this.z = -1;
      }
    }
    // Tile
    //--------------------------


    let docimgs = document.images;
    let tiles = new Array(144);
    let t = 0;
    for (let i = 0; i < docimgs.length; i++) {
      docimgs[i].onclick = function (e) {
        // e.target.style.zIndex++;
        let til = tiles[e.target.id];
        alert(e.target.alt + "," + e.target.style.zIndex + "," + e.target.id
          + "," + til.x + "-" + til.y + "-" + til.z + "### " + e.target.dataset.ix);
      };
      if (types.includes(docimgs[i].alt)) {
        tiles[t] = new Tile(docimgs[i], docimgs[i].alt);
        docimgs[i].id = "" + t;
        t++;
      }
    }

    resetMjCube();
