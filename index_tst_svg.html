    function expandMapping(map) {
      const result = [];
      map.forEach(matrix => {
        const z = matrix[0];
        const rows = matrix[1];
        rows.forEach(row => {
          const y = row[0];
          const cells = row[1];
          if (!Array.isArray(cells)) {
            result.push([z, cells, y]);
          } else {
            cells.forEach(cell => {
              if (Array.isArray(cell)) {
                let x = cell[0];
                const count = cell[1];
                for (let i = 0; i < count; i++) {
                  result.push([z, x, y]);
                  x += 2;
                }
              } else {
                result.push([z, cell, y]);
              }
            });
          }
        });
      });
      return result;
    }

    function fillMjCube(layout, tiles) {
      for (let lo = 0; lo < layout.length; lo++) {
        let x = layout[lo][1];
        let y = layout[lo][2];
        let tid = tileIds[lo];
        let tile = tiles[tid];

        let z = layout[lo][0];
        tile.x = x;
        tile.y = y;
        tile.z = z;
        tile.img.style.left = (x * 24) + OFFSET + (z * DX) + "px";
        tile.img.style.top = (y * 35) + OFFSET - (z * DY) + "px";
        // tile.img.setAttribute("data-ix", "my data: " + lox);

        mjCube[x][y][z] = tid;
        mjCube[x + 1][y][z] = tid;
        mjCube[x][y + 1][z] = tid;
        mjCube[x +1][y +1][z] = tid;
      }
    }

    function adjustZIndex() {
      let zi = 5;
      for (let z = 0; z < MAXLEV; z++) {
        for (let x = MAX_X - 1; x >= 0; x--) {
          for (let y = 0; y < MAX_Y; y++) {
            if (mjCube[x][y][z] != -1) {
              let tile = tiles[mjCube[x][y][z]];
              if (tile.img.style.zIndex == "unset") {
                tile.img.style.zIndex = zi++;
              }
            }
          }
        }
      }
