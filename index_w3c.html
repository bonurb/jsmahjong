    ];
    const types = ["circle", "bamboo", "character", "wind", "dragon", "season", "flower"];
    let tileIds = new Array(144);
    for (let i = 0; i < 144; i++) {
      tileIds[i] = i;
    }

    function pseudoRandom(seed) {
      let value = seed;

      return function () {
        value = value * 16807 % 2147483647;
        return (value - 1) / 2147483647;
      }
    }

    let generator = pseudoRandom(1);

    function getGame(gameNo) {
      for (let i = 0; i < tileIds.length; i++) {
        tileIds[i] = i;
      }
      let gen = pseudoRandom(gameNo);
      for (let i = tileIds.length - 1; i > 0; i--) {
        let j = Math.floor(gen() * 144);
        let k = tileIds[i];
        tileIds[i] = tileIds[j];
        tileIds[j] = k;
      }
    }

    function play(audioName) {
      var audio = document.getElementById(audioName);
      audio.play();
    }

    function boardNoEntered(ele) {
      if (event.key === 'Enter') {
        ele.blur();
        resetMjCube();
        resetZIndex();
        getGame(ele.value);
        fillMjCube(layoutPyramid);
        tilesOnBoard = 144;
        document.getElementById("tilnum").innerHTML = tilesOnBoard;
        adjustZIndex();
      }
    }
    //--------------------------

    //--------------------------
    // der Tile Raum: 29 x 15 x 7
    const MAX_X = 30;
    const MAX_Y = 16;
    const MAXLEV = 7;
    const OFFSET = 40;
    const DX = 10;
    const DY = 10;
    let tilesOnBoard = 0;
    let mjCube = new Array(MAX_X);

    for (let i = 0; i < MAX_X; i++) {
      mjCube[i] = new Array(MAX_Y);
      for (let j = 0; j < MAX_Y; j++) {
        mjCube[i][j] = new Array(MAXLEV);
      }
    }

    function resetMjCube() {
      for (let x = 0; x < MAX_X; x++) {
        for (let y = 0; y < MAX_Y; y++) {
          for (let z = 0; z < MAXLEV; z++) {
            mjCube[x][y][z] = "-1";
          }
        }
      }
    }

    function resetZIndex() {
      for (let i = 0; i < tiles.length; i++) {
        tiles[i].img.style.zIndex = "unset";
      }
    }

    function dropTile(x, y, tileId) {
      let z = 0;
      let xp = x + 1;
      let yp = y + 1;
      if (xp == MAX_X) {
        xp = x;
      }
      if (yp == MAX_Y) {
        yp = y;
      }

      for (let i = 0; i < MAXLEV; i++) {
        if ((mjCube[x][y][z] == -1) && (mjCube[xp][y][z] == -1)
          && (mjCube[x][yp][z] == -1) && (mjCube[xp][yp][z] == -1)) {
          break;
        }
        z++;
        if (z == MAXLEV) {
          return -1;
        }
      }
      mjCube[x][y][z] = tileId;
      mjCube[xp][y][z] = tileId;
      mjCube[x][yp][z] = tileId;
      mjCube[xp][yp][z] = tileId;

      return z;
    }

    function fillMjCube(layout) {
      for (let lo = 0; lo < 144; lo++) {
        let lox = layout[lo][0];
        let loy = layout[lo][1];
        let tid = tileIds[lo];
        let tile = tiles[tid];

        let z = dropTile(lox, loy, tid);
        tile.x = lox;
        tile.y = loy;
        tile.z = z;
        tile.img.style.visibility = "visible";
        tile.img.style.left = (lox * 23) + OFFSET - (z * DX) + "px";
        tile.img.style.top = (loy * 29) + OFFSET + (z * DY) + "px";
        // tile.img.setAttribute("data-ix", "my data: " + lox);
      }
    }

    function adjustZIndex() {
      let zi = 5;
      for (let z = 0; z < MAXLEV; z++) {
        for (let x = 0; x < MAX_X; x++) {
          for (let y = MAX_Y - 1; y >= 0; y--) {
            if (mjCube[x][y][z] != -1) {
              let tile = tiles[mjCube[x][y][z]];
              if (tile.img.style.zIndex == "unset") {
                tile.img.style.zIndex = zi++;
              }
            }
          }
        }
      }
    }
    // der Tile Raum
    //--------------------------

    //--------------------------
    // Tile
    class Tile {
      constructor(img, type) {  // Class constructor
        this.img = img;
        this.type = type;
        this.x = -1;
        this.y = -1;
        this.z = -1;
        this.removed = false;
      }

      isSelectable() {
        if (this.x == -1 || this.removed) {
          return false;
        }
        // if ((this.x == 0) || (this.x == MAX_X - 2)) {
        //   return false;
        // }
        // pruefe links und rechts
        let linksFrei = false;
        let rechtsFrei = false;
        // log("x-1,y,z: " + mjCube[this.x - 1][this.y][this.z]);
        // log("x-1,y+1,z: " + mjCube[this.x - 1][this.y + 1][this.z]);
        if ((this.x == 0) ||
          (((this.x > 0) && ((mjCube[this.x - 1][this.y][this.z] == -1)))
          && ((this.x > 0) && (this.y <= MAX_Y - 2) && (mjCube[this.x - 1][this.y + 1][this.z] == -1)))) {
          linksFrei = true;
        }

        // if ((this.x > 0) && (mjCube[this.x - 1][this.y][this.z] == -1)) {
        //   log("-");
        // }

        if ((this.x == MAX_X - 2) ||
          ((mjCube[this.x + 2][this.y][this.z] == -1)
          && ((this.y <= MAX_Y - 2) && (mjCube[this.x + 2][this.y + 1][this.z] == -1)))) {
          rechtsFrei = true;
        }
        // ganz oben == frei
        if (this.z == MAXLEV - 1) {
          return true;
        }
        // pruefe z + 1
        let obenFrei = false;
        // log(mjCube[this.x][this.y][this.z + 1]);
        // log(mjCube[this.x + 1][this.y][this.z + 1]);
        // log(mjCube[this.x][this.y + 1][this.z + 1]);
        // log(mjCube[this.x + 1][this.y + 1][this.z + 1]);
        if ((mjCube[this.x][this.y][this.z + 1] == -1)
          && ((this.x <= MAX_X - 2) && (mjCube[this.x + 1][this.y][this.z + 1] == -1))
          && ((this.y <= MAX_Y - 2) && (mjCube[this.x][this.y + 1][this.z + 1] == -1))
          && ((this.x <= MAX_X - 2) && (this.y <= MAX_Y - 2) && (mjCube[this.x + 1][this.y + 1][this.z + 1] == -1))
        ) {
          obenFrei = true;
        }
        if (linksFrei && obenFrei) {
          return true;
        }
        if (rechtsFrei && obenFrei) {
          return true;
        }
        return false;
      }
    }

    function resetTiles() {
      for (let i = 0; i < tiles.length; i++) {
        tiles[i].x = -1;
        tiles[i].y = -1;
        tiles[i].z = -1;
        tiles[i].removed = false;
      }
    }

    function doTilesMatch(til, til2) {
      if (til.type != til2.type) {
        return false;
      }
      if ((til.type === "season") || (til.type === "flower")) {
        return true;
      }
      if (til.img.src === til2.img.src) {
        return true;
      }
      return false;
    }

    function remove(til, til2) {
      tilesOnBoard -= 2;
      document.getElementById("tilnum").innerHTML = tilesOnBoard;
      til.img.style.visibility = "hidden";
      til.img.style.filter = "";
      til.removed = true;

      mjCube[til.x][til.y][til.z] = -1;
      mjCube[til.x + 1][til.y][til.z] = -1;
      mjCube[til.x][til.y + 1][til.z] = -1;
      mjCube[til.x + 1][til.y + 1][til.z] = -1;
      til.x = -1;
      til.y = -1;
      til.z = -1;

      til2.img.style.visibility = "hidden";
      til2.img.style.filter = "";
      til2.removed = true;

      mjCube[til2.x][til2.y][til2.z] = -1;
      mjCube[til2.x + 1][til2.y][til2.z] = -1;
      mjCube[til2.x][til2.y + 1][til2.z] = -1;
      mjCube[til2.x + 1][til2.y + 1][til2.z] = -1;
      til2.x = -1;
      til2.y = -1;
      til2.z = -1;
    }
    // Tile
    //--------------------------


    let docimgs = document.images;
    let tiles = new Array(144);
    let firstSel = -1;
    let t = 0;
    for (let i = 0; i < docimgs.length; i++) {
      docimgs[i].onclick = function (e) {
        // log("in onClick(): " + e.target.id);
        let til = tiles[e.target.id];
        if (!til.isSelectable()) {
          return;
        }
        // alert(e.target.alt + "," + e.target.style.zIndex + "," + e.target.id
        //   + "," + til.x + "-" + til.y + "-" + til.z + "### " + e.target.dataset.ix);
        if (firstSel == -1) {
          firstSel = e.target.id;
          // til.img.style.border = "1px solid #a71b1be5";
          til.img.style.filter = "hue-rotate(290deg) saturate(300%)";
          play("firstsel");
        } else if (e.target.id == firstSel) {
          firstSel = -1;
          til.img.style.filter = "";
          return;
        }
        else {
          let til2 = tiles[firstSel];
          if (doTilesMatch(til, til2)) {
            play("selremove");
            remove(til, til2);
            firstSel = -1;
          }
          // if (til.type === til2.type) {
          //   if ((til.type === "season") || (til.type === "flower")) {
          //     play("selremove");
          //     remove(til, til2);
          //     firstSel = -1;
          //   } else {
          //     play("selremove");
          //     remove(til, til2);;
          //     firstSel = -1;
          //   }
          // }
        }

      };

      if (types.includes(docimgs[i].alt)) {
        tiles[t] = new Tile(docimgs[i], docimgs[i].alt);
        docimgs[i].id = "" + t;
        t++;
      }
    }

    resetMjCube();
    resetZIndex();
    getGame(333);
    document.getElementById("boardno").value = 333;
    fillMjCube(layoutPyramid);
    tilesOnBoard = 144;
    document.getElementById("tilnum").innerHTML = tilesOnBoard;
    adjustZIndex();

    //     ", " + tiles[i].z + ", " + tiles[i].img.style.zIndex + ", " + tiles[i].onclick + "<br>";
    // }

    // document.getElementById("demo").innerHTML = text;

  </script>
