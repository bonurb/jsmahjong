      [13, 7]
    ];
    const types = ["circle", "bamboo", "character", "wind", "dragon", "season", "flower"];
    let tileIds = new Array(144);
    for (let i = 0; i < 144; i++) {
      tileIds[i] = i;
    }

    function pseudoRandom(seed) {
      let value = seed;

      return function () {
        value = value * 16807 % 2147483647;
        return (value - 1) / 2147483647;
      }
    }

    let generator = pseudoRandom(1);

    function getGame(gameNo) {
      for (let i = 0; i < 144; i++) {
        tileIds[i] = i;
      }
      let gen = pseudoRandom(gameNo);
      for (let i = tileIds.length - 1; i > 0; i--) {
        let j = Math.floor(gen() * (i + 1));
        let k = tileIds[i];
        tileIds[i] = tileIds[j];
        tileIds[j] = k;
      }
    }

    function play(img) {
      var audio = document.getElementById("audio");
      audio.play();
      alert(img.id);
    }

    //--------------------------

    //--------------------------
    // der Tile Raum: 29 x 15 x 7
    const MAX_X = 29;
    const MAX_Y = 15;
    const MAXLEV = 7;
    const OFFSET = 10;
    let mjCube = new Array(MAX_X);

    for (let i = 0; i < MAX_X; i++) {
      mjCube[i] = new Array(MAX_Y);
      for (let j = 0; j < MAX_Y; j++) {
        mjCube[i][j] = new Array(MAXLEV);
      }
    }

    function resetMjCube() {
      for (let x = 0; x < 26; x++) {
        for (let y = 0; y < 12; y++) {
          for (let z = 0; z < 7; z++) {
            mjCube[x][y][z] = "-1";
          }
        }
      }
    }

    function dropTile(x, y, tileId) {
      let z = 0;

      for (let i = 0; i < MAXLEV; i++) {
        if ((mjCube[x][y][z] == -1) && (mjCube[x + 1][y][z] == -1) && (mjCube[x][y + 1][z] == -1) && (mjCube[x + 1][y + 1][z] == -1)) {
          break;
        }
        z++;
        if (z > MAXLEV) {
          return -1;
        }
      }
      mjCube[x][y][z] = tileId;
      mjCube[x + 1][y][z] = tileId;
      mjCube[x][y + 1][z] = tileId;
      mjCube[x + 1][y + 1][z] = tileId;

      return z;
    }

    function fillMjCube(layout) {
      for (let lo = 0; lo < 144; lo++) {
        let lox = layout[lo][0];
        let loy = layout[lo][1];
        let tid = tileIds[lo];
        let tile = tiles[tid];

        let z = dropTile(lox, loy, tid);
        tile.x = lox;
        tile.y = loy;
        tile.z = z;
        tile.img.style.visibility = "visible";
        tile.img.style.left = (lox * 25) + OFFSET + "px";
        tile.img.style.top = (loy * 35) + OFFSET + "px";
      }
    }
    // der Tile Raum
    //--------------------------

    //--------------------------
    // Tile
    class Tile {
      constructor(img, type) {  // Class constructor
        this.img = img;
        this.type = type;
        this.x = -1;
        this.y = -1;
        this.z = -1;
      }
    }
    // Tile
    //--------------------------

    let docimgs = document.images;
    let text = "";
    for (let i = 0; i < docimgs.length; i++) {
      text += docimgs[i].src + ", " + docimgs[i].style.position + ", " + docimgs[i].style.top +
        ", " + docimgs[i].alt + "<br>";
    }
    // docimgs[1].style.top = "750px";
    // docimgs[2].style.visibility = "hidden";

    document.getElementById("demo").innerHTML = text;

    let tiles = new Array(144);
    let t = 0;
    for (let i = 0; i < docimgs.length; i++) {
      if (types.includes(docimgs[i].alt)) {
        tiles[t] = new Tile(docimgs[i].src, docimgs[i].alt);
        t++;
      }
    }

    resetMjCube();
    getGame(333);
