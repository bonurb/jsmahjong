    function openModal() {
      document.getElementById("myModal").style.display = "flex";

      var original = document.getElementById('card');
      var parent = original.parentNode;
      original.parentNode.replaceChildren();
      original.getElementsByTagName('p')[0].innerHTML = generateSVG(expandMapping(obj[0].map));
      original.getElementsByTagName('p')[1].innerHTML = obj[0].name;
      parent.appendChild(original);
      for (let i = 1; i < obj.length; i++) {
        var clone = original.cloneNode(true);
        clone.id = "card" + i;
        clone.getElementsByTagName('p')[0].id = "modthumb" + i;
        clone.getElementsByTagName('p')[0].innerHTML = generateSVG(expandMapping(obj[i].map));
        clone.getElementsByTagName('p')[1].id = "loname" + i;
        clone.getElementsByTagName('p')[1].innerHTML = obj[i].name;
        clone.dataset.loindex = i;
        original.parentNode.appendChild(clone);
      }
    }

    function closeModal() {
      document.getElementById("myModal").style.display = "none";

    function expandMapping(map) {
      const result = [];
      map.forEach(matrix => {
        const z = matrix[0];
        const rows = matrix[1];
        rows.forEach(row => {
          const y = row[0];
          const cells = row[1];
          if (!Array.isArray(cells)) {
            result.push([z, cells, y]);
          } else {
            cells.forEach(cell => {
              if (Array.isArray(cell)) {
                let x = cell[0];
                const count = cell[1];
                for (let i = 0; i < count; i++) {
                  result.push([z, x, y]);
                  x += 2;
                }
              } else {
                result.push([z, cell, y]);
              }
            });
          }
        });
      });
      return result;
    }

    function getSolvGame(lo) {

    // parse map: https://github.com/ffalt/mah/blob/main/src/app/model/mapping.ts

    var firstsel = new Audio("images/67.wav");

    var applause = new Audio("images/APPLAUSE.WAV");

    let gensolvable = true;
    const MAXBOARDNUM = 10000000;

    const filter1 = "drop-shadow(-8px 10px 2px rgba(0, 0, 0, 0.7)) ";
    const types = ["circle", "bamboo", "character", "wind", "dragon", "season", "flower"];
    let tileIds = new Array(144);
    for (let i = 0; i < 144; i++) {
      tileIds[i] = i;
    }

    function pseudoRandom(seed) {
      let value = seed;

      return function () {
        value = value * 16807 % 2147483647;
        return (value - 1) / 2147483647;
      }
    }

    function getGame() {
      generator = pseudoRandom(bnum);

      for (let i = 0; i < tileIds.length; i++) {
        tileIds[i] = i;
      }
      let gen = generator;
      for (let i = tileIds.length - 1; i >= 0; i--) {
        let j = Math.floor(gen() * 144);
        let k = tileIds[i];
        tileIds[i] = tileIds[j];
        tileIds[j] = k;
      }
    }

    function play(audioName) {
      var audio = document.getElementById(audioName);
      audio.play();

    //--------------------------
    // der Tile Raum: 34 x 18 x 7
    const MAX_X = 34;
    const MAX_Y = 18;
    const MAXLEV = 7;
    const OFFSET = 40;
    const DX = 6;
    const DY = 6;
    let tilesOnBoard = 0;
    const selectables = new Set();
    const matches = new Set();
    let undoStack = [];
    let matchIter;
    let mjCube = new Array(MAX_X);

    for (let i = 0; i < MAX_X; i++) {
      mjCube[i] = new Array(MAX_Y);
      for (let j = 0; j < MAX_Y; j++) {
        mjCube[i][j] = new Array(MAXLEV);
      }
    }

    function resetMjCube() {
      for (let x = 0; x < MAX_X; x++) {
        for (let y = 0; y < MAX_Y; y++) {
          for (let z = 0; z < MAXLEV; z++) {
            mjCube[x][y][z] = "-1";
          }
        }
      }
    }

    function fillMjCube(layout, tiles) {
      for (let lo = 0; lo < layout.length; lo++) {
        let x = layout[lo][1];
        let y = layout[lo][2];
        let tid = tileIds[lo];
        let tile = tiles[tid];

        let z = layout[lo][0];
        tile.x = x;
        tile.y = y;
        tile.z = z;
        tile.img.style.left = (x * 24) + OFFSET + (z * DX) + "px";
        tile.img.style.top = (y * 35) + OFFSET - (z * DY) + "px";
        // tile.img.setAttribute("data-ix", "my data: " + lox);

        mjCube[x][y][z] = tid;
        mjCube[x + 1][y][z] = tid;
        mjCube[x][y + 1][z] = tid;
        mjCube[x + 1][y + 1][z] = tid;
      }
    }

    function calcMatches(tiles) {
      matches.clear();
      let sels = new Set();
      selectables.forEach(function (value) {
        sels.add(value);
      });
      let i1 = -1;
      let i2 = -1;
      sels.forEach(function (v1) {
        sels.forEach(function (v2) {
          if ((v1 != v2) && doTilesMatch(tiles[v1], tiles[v2])) {
            matches.add(new Match(tiles[v1], tiles[v2]));
          }
        });
        sels.delete(v1);
      });
      matchIter = matches.values();

      // let text = "";
      // matches.forEach(function (m) {
      //   text += m.til1.x + "-" + m.til1.y + ";" + m.til2.x + "-" + m.til2.y + " ";
      // });
      // log(text);
    }

    function updateBoard() {
      selectables.clear();
      for (let i = 0; i < tiles.length; i++) {
        if (tiles[i].isSelectable()) {
          tiles[i].img.style.filter = filter1;
          selectables.add(i);
        } else {
          tiles[i].img.style.filter = filter1 + "brightness(70%)";
        }
      }
      calcMatches(tiles);
      document.getElementById("matchnum").innerHTML = matches.size;
    }
    // der Tile Raum

    //--------------------------
    // Tile
    class Match {
      constructor(til1, til2) {  // Class constructor
        this.til1 = til1;
        this.til2 = til2;
      }

    }

    class Tile {
      constructor(img, type) {  // Class constructor
        this.img = img;
        this.type = type;
        this.x = -1;
        this.y = -1;
        this.z = -1;
        this.removed = false;
      }

      isSelectable() {
        if (this.x == -1 || this.removed) {
          return false;
        }
        // if ((this.x == 0) || (this.x == MAX_X - 2)) {
        //   return false;
        // }
        // pruefe links und rechts
        let linksFrei = false;
        let rechtsFrei = false;
        // log("x-1,y,z: " + mjCube[this.x - 1][this.y][this.z]);
        // log("x-1,y+1,z: " + mjCube[this.x - 1][this.y + 1][this.z]);
        if ((this.x == 0) ||
          (((this.x > 0) && ((mjCube[this.x - 1][this.y][this.z] == -1)))
            && ((this.x > 0) && (this.y <= MAX_Y - 2) && (mjCube[this.x - 1][this.y + 1][this.z] == -1)))) {
          linksFrei = true;
        }

        // if ((this.x > 0) && (mjCube[this.x - 1][this.y][this.z] == -1)) {
        //   log("-");
        // }

        if ((this.x == MAX_X - 2) ||
          ((mjCube[this.x + 2][this.y][this.z] == -1)
            && ((this.y <= MAX_Y - 2) && (mjCube[this.x + 2][this.y + 1][this.z] == -1)))) {
          rechtsFrei = true;
        }
        // ganz oben == frei
        if (this.z == MAXLEV - 1) {
          return true;
        }
        // pruefe z + 1
        let obenFrei = false;
        // log(mjCube[this.x][this.y][this.z + 1]);
        // log(mjCube[this.x + 1][this.y][this.z + 1]);
        // log(mjCube[this.x][this.y + 1][this.z + 1]);
        // log(mjCube[this.x + 1][this.y + 1][this.z + 1]);
        if ((mjCube[this.x][this.y][this.z + 1] == -1)
          && ((this.x <= MAX_X - 2) && (mjCube[this.x + 1][this.y][this.z + 1] == -1))
          && ((this.y <= MAX_Y - 2) && (mjCube[this.x][this.y + 1][this.z + 1] == -1))
          && ((this.x <= MAX_X - 2) && (this.y <= MAX_Y - 2) && (mjCube[this.x + 1][this.y + 1][this.z + 1] == -1))
        ) {
          obenFrei = true;
        }
        if (linksFrei && obenFrei) {
          return true;
        }
        if (rechtsFrei && obenFrei) {
          return true;
        }
        return false;
      }
    }

    function resetTiles() {
      for (let i = 0; i < tiles.length; i++) {
        tiles[i].x = -1;
        tiles[i].y = -1;
        tiles[i].z = -1;
        tiles[i].removed = false;
        tiles[i].img.style.visibility = "hidden";
        tiles[i].img.style.zIndex = 0;
        tiles[i].img.style.filter = filter1;
        // tileIds[i] = i;
      }
    }

    function placeTiles() {
      let board = document.getElementById("board");
      board.replaceChildren();
      tilesOnBoard = 0;

      let til;
      while (true) {
        til = getNextDrawable();
        if (til == undefined) {
          break;
        }
        board.appendChild(til.img);
        til.img.style.visibility = "visible";
        tilesOnBoard++;
      }
      document.getElementById("tilnum").innerHTML = tilesOnBoard;
    }

    function getNextDrawable() {
      for (let z = 0; z < MAXLEV; z++) {
        for (let x = MAX_X - 1; x >= 0; x--) {
          for (let y = 0; y < MAX_Y; y++) {
            if ((mjCube[x][y][z] != -1) && (tiles[mjCube[x][y][z]].img.style.visibility == "hidden")) {
              let thidden = tiles[mjCube[x][y][z]];
              if (isDrawable(thidden.x, thidden.y, z)) {
                return thidden;
              }
            }
          }
        }
      }
      return undefined;
    }

    function isDrawable(x, y, z) {
      if (((x + 1) == MAX_X) || (x == 0)) {
        return true;
      }
      if (((y + 1) == MAX_Y) || (y == 0)) {
        return true;
      }
      if ((mjCube[x][y - 1][z] != -1)) {
        if (tiles[mjCube[x][y - 1][z]].img.style.visibility == "hidden") {
          return false;
        }
      }
      if ((mjCube[x + 1][y - 1][z] != -1)) {
        if (tiles[mjCube[x + 1][y - 1][z]].img.style.visibility == "hidden") {
          return false;
        }
      }
      return true;
    }

    function doTilesMatch(til, til2) {
      if (til.type != til2.type) {
        return false;
      }
      if ((til.type === "season") || (til.type === "flower")) {
        return true;
      }
      if (til.img.src === til2.img.src) {
        return true;
      }
      return false;
    }

    function remove(til, til2) {
      tilesOnBoard -= 2;
      undoStack.push(new Match(til, til2));
      document.getElementById("tilnum").innerHTML = tilesOnBoard;
      if (tilesOnBoard == 0) {
        applause.play();
      }
      til.img.style.visibility = "hidden";
      til.img.style.filter = filter1;
      til.removed = true;

      mjCube[til.x][til.y][til.z] = -1;
      mjCube[til.x + 1][til.y][til.z] = -1;
      mjCube[til.x][til.y + 1][til.z] = -1;
      mjCube[til.x + 1][til.y + 1][til.z] = -1;
      // til.x = -1;
      // til.y = -1;
      // til.z = -1;

      til2.img.style.visibility = "hidden";
      til2.img.style.filter = filter1;
      til2.removed = true;

      mjCube[til2.x][til2.y][til2.z] = -1;
      mjCube[til2.x + 1][til2.y][til2.z] = -1;
      mjCube[til2.x][til2.y + 1][til2.z] = -1;
      mjCube[til2.x + 1][til2.y + 1][til2.z] = -1;
      // til2.x = -1;
      // til2.y = -1;
      // til2.z = -1;
    }

    function undo() {
      let m = undoStack.pop();
      if (m == undefined) {
        return;
      }
      tilesOnBoard += 2;
      document.getElementById("tilnum").innerHTML = tilesOnBoard;
      m.til1.img.style.visibility = "visible";
      m.til1.img.style.filter = filter1;
      m.til1.removed = false;
      let id = m.til1.img.id;
      let x = m.til1.x;
      let y = m.til1.y;
      let z = m.til1.z;
      mjCube[x][y][z] = id;
      mjCube[x + 1][y][z] = id;
      mjCube[x][y + 1][z] = id;
      mjCube[x + 1][y + 1][z] = id;

      m.til2.img.style.visibility = "visible";
      m.til2.img.style.filter = filter1;
      m.til2.removed = false;
      id = m.til2.img.id;
      x = m.til2.x;
      y = m.til2.y;
      z = m.til2.z;
      mjCube[x][y][z] = id;
      mjCube[x + 1][y][z] = id;
      mjCube[x][y + 1][z] = id;
      mjCube[x + 1][y + 1][z] = id;

      updateBoard();
    }
    // Tile

      firstsel.play();
    }

    let docimgs = document.images;
    let tiles = new Array(144);
    let firstSel = -1;

        unsel.removeEventListener("ended", playfsel);

        }

      if (types.includes(docimgs[i].alt)) {
        tiles[t] = new Tile(docimgs[i], docimgs[i].alt);

        tiles[t].img.style.visibility = "hidden";
        tiles[t].img.style.position = "absolute";
        tiles[t].img.style.width = "50px";
        tiles[t].img.setAttribute("draggable", false);
        tiles[t].img.style.zIndex = 0;
        t++;
      }
    }

    resetTiles();
    resetMjCube();

    if (gensolvable) {
      getSolvGame(actLayout);
    } else {
      getGame();

    fillMjCube(actLayout, tiles);
    placeTiles();

    updateBoard();
