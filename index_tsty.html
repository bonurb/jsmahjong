<!DOCTYPE html>
<html>

<head>
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      grid-template-rows: repeat(4, minmax(80px, auto));
    }

    .item_1 {
      display: grid;
      grid-column: 1 / 20;
      grid-row: 1 / 1;
      grid-template-columns: subgrid;
      grid-template-rows: subgrid;
    }

    .item_2 {
      display: grid;
      grid-column: 1 / 20;
      grid-row: 2 / 2;
      grid-template-columns: subgrid;
      grid-template-rows: subgrid;
    }

    .subitem {
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden
    }

    .subitem img {
      flex-shrink: 0;
      min-width: 100%;
      min-height: 100%
    }
  </style>
</head>

<body>

  <h1>The align-content Property</h1>

  <p>The "align-content: flex-end;" displays the flex lines at the end of the container:</p>

  <div class="grid">
    <div class="item_1">
      <div class="subitem">
        <img src="images/MJt2-.svg" alt="flower">
      </div>
      <div class="subitem">
        <img src="images/MJs2-.svg" alt="flower">
      </div>

      <div class="subitem">3</div>
      <div class="subitem">4</div>
      <div class="subitem">5</div>
      <div class="subitem">6</div>
      <div class="subitem">7</div>
      <div class="subitem">8</div>
      <div class="subitem">9</div>
      <div class="subitem">10</div>
      <div class="subitem">11</div>
      <div class="subitem">12</div>
      <div class="subitem">13</div>
      <div class="subitem">14</div>
    </div>
    <div class="item_2">
      <div class="item_1">
        <div class="subitem">
          <img src="images/MJt2-.svg" alt="flower">
        </div>
        <div class="subitem">
          <img src="images/MJs2-.svg" alt="flower">
        </div>
        <div class="subitem">3</div>
        <div class="subitem">4</div>
        <div class="subitem">5</div>
        <div class="subitem">6</div>
        <div class="subitem">7</div>
        <div class="subitem">8</div>
        <div class="subitem">9</div>
        <div class="subitem">10</div>
        <div class="subitem">11</div>
        <div class="subitem">12</div>
        <div class="subitem">13</div>
        <div class="subitem">14</div>
      </div>
    </div>

</body>

</html>
